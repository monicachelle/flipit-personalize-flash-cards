<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlipIt Studio – Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- ---------------- NAVBAR / TOPBAR ---------------- -->
<div class="topbar">
  <div class="logo">FlipIt Studio ✨🎉</div>
  <div style="display: flex; gap: 10px;">
    <button class="logout-btn" onclick="goToMainPage()">🏠 Main Page</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- ---------------- SIDEBAR ---------------- -->
<div class="sidebar">
  <ul class="sidebar-menu">
    <li class="active" data-section="home">Home 🏠</li>
    <li data-section="create">Design 🎨</li>
    <li data-section="save">Save 🌸</li>
    <li data-section="export">Export 📄</li>
    <li data-section="flip">Flip 🦋</li>
  </ul>
</div>

<!-- ---------------- MAIN CONTENT ---------------- -->
<div class="main-content" id="feature-content">
  <!-- Feature content will load here -->
</div>

<script src="dashboard.js"></script>
</body>
</html>
