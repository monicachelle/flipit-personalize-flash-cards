<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Export - FlipIt Studio</title>
  <link rel="stylesheet" href="export.css">
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<section class="export-container">
  
  <div class="export-header">
    <h1 class="export-title">📤 Export Flashcards</h1>
    <p class="export-subtitle">Select cards to export as PDF or text file</p>
  </div>

  <div class="export-controls">
    <div class="select-all-container">
      <input type="checkbox" id="selectAllCheckbox">
      <label for="selectAllCheckbox">Select All Cards</label>
    </div>
    
    <div class="export-actions">
      <select id="exportFormat" class="export-format">
        <option value="pdf">PDF Document 📄</option>
        <option value="txt">Text File 📝</option>
      </select>
      <button class="export-btn" id="exportBtn" disabled>
        <span>📥</span> Export Selected
      </button>
    </div>
  </div>

  <div class="export-cards-grid" id="exportCardsGrid">
    <div class="empty-collection">
      <p>🌸 No cards available. Go to Design and save some cards first!</p>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="preview-modal" id="previewModal" style="display: none;">
    <div class="preview-content">
      <h3>📋 Export Preview</h3>
      <div class="pdf-preview-area" id="previewArea">
        <!-- Preview content will be loaded here -->
      </div>
      <div class="preview-actions">
        <button class="preview-btn preview-close" id="closePreview">Close</button>
        <button class="preview-btn preview-download" id="downloadExport">Download</button>
      </div>
    </div>
  </div>

  <!-- Exported Files History Section -->
  <div class="exported-files-section">
    <div class="exported-files-header">
      <h3>📁 Your Exported Files</h3>
      <button class="clear-all-btn" id="clearAllBtn">Clear All</button>
    </div>
    <div class="exported-files-grid" id="exportedFilesGrid">
      <div class="empty-files">
        <p>📁 No exported files yet. Export your first flashcard collection!</p>
      </div>
    </div>
  </div>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="export.js"></script>
</body>
</html>
